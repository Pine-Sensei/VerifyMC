language: en
debug: false
admin_auth:
  mode: op
web_port: 8080
ws_port: 8081
web_server_prefix: '[ Name ]'
ssl:
  enabled: false
  keystore:
    path: ""
    password: ""
    type: PKCS12
auth_methods:
  - email
max_accounts_per_email: 2
whitelist_mode: plugin
web_register_url: https://domain.com/
register:
  auto_approve: false
username_regex: "^[a-zA-Z0-9_-]{3,16}$"
username_case_sensitive: false
user_notification:
  enabled: true
  on_approve: true
  on_reject: true
frontend:
  theme: glassx
  logo_url: /logo.png
  announcement: Welcome to [ Name ]!
  serve_static: true
  allowed_origins: []
smtp:
  host: smtp.qq.com
  port: 587
  username: your_email@qq.com
  password: your_email_password
  from: your_email@qq.com
  enable_ssl: true
email_subject: VerifyMC Verification Code
auto_update_resources: true
enable_email_domain_whitelist: true
enable_email_alias_limit: false
email_domain_whitelist:
  - gmail.com
  - 163.com
  - 126.com
  - qq.com
  - outlook.com
  - hotmail.com
  - icloud.com
  - yahoo.com
  - foxmail.com
storage: file
mysql:
    host: localhost
    port: 3306
    database: verifymc
    user: root
    password: yourpassword
    useSSL: true
    allowPublicKeyRetrieval: false
authme:
  enabled: true
  password_regex: "^[a-zA-Z0-9_]{8,26}$"
  database:
    type: sqlite
    table: authme
    # 密码格式仅支持 sha256，盐长度固定为 16
    sync_interval_seconds: 30
    mysql:
      host: 127.0.0.1
      port: 3306
      database: authme
      user: root
      password: yourpassword
      useSSL: true
      allowPublicKeyRetrieval: false
    sqlite:
      path: plugins/AuthMe/authme.db
    columns:
      mySQLColumnId: id
      mySQLColumnName: username
      mySQLRealName: realname
      mySQLColumnPassword: password
      mySQLColumnSalt: ''
      mySQLColumnEmail: email
      mySQLColumnLogged: isLogged
      mySQLColumnHasSession: hasSession
      mySQLColumnIp: ip
      mySQLColumnLastLogin: lastlogin
      mySQLColumnRegisterDate: regdate
      mySQLColumnRegisterIp: regip
      mySQLlastlocX: x
      mySQLlastlocY: y
      mySQLlastlocZ: z
      mySQLlastlocWorld: world
      mySQLlastlocYaw: yaw
      mySQLlastlocPitch: pitch
      mySQLPlayerUUID: ''
captcha:
  type: math
  length: 4
  expire_seconds: 300
bedrock:
  enabled: false
  prefix: "."
  username_regex: "^[a-zA-Z0-9._-]{3,15}$"
questionnaire:
  enabled: false
  pass_score: 60
  rate_limit:
    window_ms: 300000
    ip:
      max: 20
    uuid:
      max: 8
    email:
      max: 6
llm:
  enabled: true
  provider: deepseek
  api_base: https://api.deepseek.com/v1
  api_key: ""
  model: deepseek-chat
  timeout: 10000
  retry: 1
  max_concurrency: 4
  acquire_timeout: 1500
  retry_backoff_base: 300
  retry_backoff_max: 5000
  input_max_length: 2000
  circuit_breaker:
    failure_threshold: 5
    open_ms: 30000
  system_prompt: |
    You are a fair Minecraft whitelist questionnaire grader.
    Score strictly based on the question, candidate answer, and scoring rule.
    Return JSON only.
  scoring_rule: |
    Evaluate primarily:
    1) Relevance to the question
    2) Completeness and level of detail
    3) Understanding of server rules and community norms
  score_format: '{"score": number, "reason": string, "confidence": number}'
discord:
  enabled: false
  client_id: ""
  client_secret: ""
  redirect_uri: "https://yourdomain.com/api/discord/callback"
  guild_id: ""
  required: false

downloads:
  client-modpack:
    name: "Client Modpack"
    description: "Required modpack for the server. Includes all necessary mods and configurations."
    version: "1.0.0"
    size: "256 MB"
    url: "#"
    icon: "gamepad"
  server-resource-pack:
    name: "Server Resource Pack"
    description: "Custom textures and assets for the server."
    version: "2.1.0"
    size: "64 MB"
    url: "#"
    icon: "package"
